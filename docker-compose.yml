services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: filebase
      POSTGRES_PASSWORD: password
      POSTGRES_DB: filebase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
